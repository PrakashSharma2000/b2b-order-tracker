spring.application.name=b2b-order-tracker
spring.datasource.url=jdbc:postgresql://localhost:5432/b2b_tracker
spring.datasource.username=${SpringDataBaseUserName}
spring.datasource.password=${SpringDataBaseUserPass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

server.port=8080